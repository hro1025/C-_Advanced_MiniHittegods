# Use postgres/example user/password credentials

services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: minihittegods

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    shm_size: 128mb

   


  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  api:
    build:
      context: ..
      dockerfile: MiniHittegods.Api/Dockerfile
    ports:
      - 5000:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - db


volumes:
  postgres_data:

